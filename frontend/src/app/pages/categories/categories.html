<app-layout>
  <div class="page-header">
    <h1 class="page-title">Categories</h1>
    <button class="btn btn-secondary" (click)="openAdd()">+ Add Category</button>
  </div>

  <app-loading [loading]="loading" message="Loading categories..."></app-loading>

  <div *ngIf="!loading">
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <!-- Category cards grid -->
    <div class="cat-grid" *ngIf="categories.length > 0">
      <div class="cat-card" *ngFor="let c of categories">
        <div class="cat-swatch" [style.background]="c.color"></div>
        <div class="cat-info">
          <span class="cat-name">{{ c.icon ? c.icon + ' ' : '' }}{{ c.name }}</span>
          <span class="cat-sync" [class.synced]="!!c.synced_at">
            {{ c.synced_at ? '✓ Synced' : '⏳ Pending' }}
          </span>
          <span class="cat-hidden" *ngIf="!c.is_visible">Hidden</span>
        </div>
        <div class="cat-actions">
          <button class="btn btn-outline btn-sm" (click)="openEdit(c)">Edit</button>
          <button class="btn btn-danger btn-sm" (click)="deleteCategory(c)">Delete</button>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="categories.length === 0 && !error">
      <div class="empty-icon">🏷️</div>
      <p>No categories yet.</p>
      <button class="btn btn-secondary" (click)="openAdd()">Add First Category</button>
    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" *ngIf="showForm" (click)="showForm=false">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editingId ? 'Edit Category' : 'Add Category' }}</h3>
        <button class="close-btn" (click)="showForm=false">✕</button>
      </div>
      <div class="modal-body">

        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-control" [(ngModel)]="form.name" placeholder="e.g. Main Course" maxlength="200" />
        </div>

        <div class="form-group">
          <label class="form-label">Icon <span class="form-hint">(emoji or text, optional)</span></label>
          <input class="form-control" [(ngModel)]="form.icon" placeholder="e.g. 🍔" maxlength="10" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Sort Order</label>
            <input class="form-control" type="number" [(ngModel)]="form.sort_order" min="0" />
          </div>
          <div class="form-group form-check-group">
            <label class="form-label">Visibility</label>
            <label class="form-check">
              <input type="checkbox" [(ngModel)]="form.is_visible" /> Visible in POS
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Color</label>
          <!-- Preset swatches -->
          <div class="color-swatches">
            <button class="swatch" *ngFor="let c of PRESET_COLORS"
                    [style.background]="c"
                    [class.selected]="form.color === c"
                    (click)="form.color = c"
                    type="button">
            </button>
          </div>
          <!-- Custom color picker -->
          <div class="color-custom">
            <input type="color" [(ngModel)]="form.color" class="color-input" />
            <span class="color-hex">{{ form.color }}</span>
          </div>
          <!-- Preview -->
          <div class="color-preview">
            <span class="badge-preview" [style.background]="form.color + '22'" [style.color]="form.color">
              {{ form.name || 'Preview' }}
            </span>
          </div>
        </div>

        <div class="alert alert-danger" *ngIf="formError">{{ formError }}</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" (click)="showForm=false">Cancel</button>
        <button class="btn btn-secondary" (click)="save()" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </div>
  </div>
</app-layout>
