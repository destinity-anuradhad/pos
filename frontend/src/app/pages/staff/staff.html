<app-layout>
  <div class="page-content">
    <div class="toolbar d-flex align-items-center justify-content-between mb-3">
      <h2 class="page-title">Staff Management</h2>
      <button class="btn btn-secondary" (click)="openAdd()">+ Add Staff</button>
    </div>

    <div *ngIf="loading" class="text-center py-4">
      <div class="spinner-border"></div>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <div class="table-responsive" *ngIf="!loading">
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of staffList">
            <td data-label="Name">
              <div class="staff-name-cell">
                <div class="avatar-sm" [style.background]="ROLE_COLORS[s.role]">{{ s.display_name.charAt(0) }}</div>
                {{ s.display_name }}
                <span class="badge badge-danger ms-1" *ngIf="isLocked(s)" title="Account locked">🔒</span>
              </div>
            </td>
            <td data-label="Username"><code>{{ s.username }}</code></td>
            <td data-label="Role">
              <span class="role-badge" [style.background]="ROLE_COLORS[s.role] + '22'" [style.color]="ROLE_COLORS[s.role]">
                {{ ROLE_LABELS[s.role] }}
              </span>
            </td>
            <td data-label="Status">
              <span class="status-badge" [class.active]="s.is_active">{{ s.is_active ? 'Active' : 'Inactive' }}</span>
            </td>
            <td data-label="Actions" class="td-actions">
              <button class="btn btn-sm btn-outline" (click)="openEdit(s)">Edit</button>
              <button class="btn btn-sm btn-danger" *ngIf="s.is_active" (click)="deactivate(s)">Deactivate</button>
              <button class="btn btn-sm btn-outline" *ngIf="!s.is_active" (click)="reactivate(s)">Reactivate</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" *ngIf="showForm" appModal>
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editingId ? 'Edit Staff' : 'Add Staff' }}</h3>
        <button class="close-btn" (click)="showForm=false">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-3">
          <label class="form-label">Display Name</label>
          <input class="form-control" [(ngModel)]="form.display_name" placeholder="e.g. Kasun Perera" maxlength="200" />
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Username <span class="form-hint">(used to log in)</span></label>
          <input class="form-control" [(ngModel)]="form.username" placeholder="e.g. kasun" maxlength="100" autocomplete="off" />
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Role</label>
          <select class="form-control" [(ngModel)]="form.role">
            <option *ngFor="let r of ROLES" [value]="r">{{ ROLE_LABELS[r] }}</option>
          </select>
        </div>

        <!-- Cashier: PIN -->
        <ng-container *ngIf="isCashierForm">
          <div class="form-group mb-3">
            <label class="form-label">PIN {{ editingId ? '(leave blank to keep current)' : '' }}</label>
            <input class="form-control" [(ngModel)]="form.pin" type="password" inputmode="numeric"
                   maxlength="8" placeholder="4-8 digits" autocomplete="new-password" />
          </div>
          <div class="form-group mb-3" *ngIf="form.pin">
            <label class="form-label">Confirm PIN</label>
            <input class="form-control" [(ngModel)]="form.confirmCredential" type="password" inputmode="numeric"
                   maxlength="8" placeholder="Re-enter PIN" />
          </div>
        </ng-container>

        <!-- Manager/Admin: password -->
        <ng-container *ngIf="!isCashierForm">
          <div class="form-group mb-3">
            <label class="form-label">Password {{ editingId ? '(leave blank to keep current)' : '' }}</label>
            <input class="form-control" [(ngModel)]="form.password" type="password"
                   minlength="6" placeholder="Min. 6 characters" autocomplete="new-password" />
          </div>
          <div class="form-group mb-3" *ngIf="form.password">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" [(ngModel)]="form.confirmCredential" type="password"
                   placeholder="Re-enter password" />
          </div>
        </ng-container>

        <div class="alert alert-danger" *ngIf="formError">{{ formError }}</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" (click)="showForm=false">Cancel</button>
        <button class="btn btn-secondary" (click)="save()" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </div>
  </div>
</app-layout>
