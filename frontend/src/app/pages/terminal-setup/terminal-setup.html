<div class="setup-wrap">
  <div class="setup-card">

    <div class="setup-logo">
      <img src="/logo.svg" alt="Destinity Inspire" />
    </div>

    <h1 class="setup-title">Terminal Setup</h1>
    <p class="setup-sub">First-time setup — admin required</p>

    <div class="platform-badge">
      <span class="platform-dot"></span>
      {{ platformLabel }}
    </div>

    <div class="uuid-display">
      <span class="uuid-label">Device UUID</span>
      <span class="uuid-value">{{ terminal.getUUID() }}</span>
    </div>

    <form class="setup-form" (ngSubmit)="save()">

      <div class="form-group">
        <label>Terminal Code <span class="required">*</span></label>
        <input
          type="text"
          [(ngModel)]="terminalCode"
          name="terminalCode"
          [placeholder]="codePlaceholder"
          class="form-input"
          autocomplete="off"
          maxlength="20"
        />
        <div class="form-hint">Unique identifier for this device (e.g. COL-M-01 = Colombo, Mobile, Device 1)</div>
      </div>

      <div class="form-group">
        <label>Terminal Name <span class="required">*</span></label>
        <input
          type="text"
          [(ngModel)]="terminalName"
          name="terminalName"
          placeholder="e.g. Colombo Mobile Counter 1"
          class="form-input"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label>Admin PIN <span class="required">*</span></label>
        <input
          type="password"
          [(ngModel)]="adminPin"
          name="adminPin"
          placeholder="Enter admin PIN"
          class="form-input"
          maxlength="8"
        />
        <div class="form-hint">Required to register a new terminal</div>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="save-btn" [disabled]="saving">
        <span *ngIf="!saving">Register Terminal</span>
        <span *ngIf="saving">Registering...</span>
      </button>

    </form>

  </div>
</div>
