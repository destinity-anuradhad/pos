<app-layout>
  <div class="page-header">
    <h1 class="page-title">Orders</h1>
    <div class="page-header-right">
      <span class="badge badge-info">{{ filteredOrders.length }} shown</span>
      <button class="btn btn-outline btn-sm" (click)="load()">↻ Refresh</button>
    </div>
  </div>

  <!-- Error -->
  <div class="offline-notice" *ngIf="error">⚠️ {{ error }}</div>

  <app-loading [loading]="loading" message="Loading orders..."></app-loading>

  <div class="card" *ngIf="!loading">
    <div class="orders-toolbar">
      <input class="form-control search-input" type="text"
             placeholder="Search by table or order #..."
             [(ngModel)]="searchTerm" (input)="applyFilter()" />
      <select class="form-control status-filter" [(ngModel)]="filterStatus" (change)="applyFilter()">
        <option value="all">All Status</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <table class="table" *ngIf="filteredOrders.length > 0">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Table / Source</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of filteredOrders">
          <td data-label="Order #"><strong>#{{ o.id }}</strong></td>
          <td data-label="Table">{{ o.table_name }}</td>
          <td data-label="Items">{{ o.item_count }}</td>
          <td data-label="Total">{{ o.currency }} {{ o.total_amount | number:'1.2-2' }}</td>
          <td data-label="Status">
            <span class="badge"
              [class.badge-success]="o.status === 'completed'"
              [class.badge-warning]="o.status === 'pending'"
              [class.badge-danger]="o.status === 'cancelled'">
              {{ o.status }}
            </span>
          </td>
          <td data-label="Time" class="date-cell">{{ timeAgo(o.created_at) }}</td>
        </tr>
      </tbody>
    </table>

    <div class="empty-state" *ngIf="filteredOrders.length === 0">
      <div class="empty-icon">📋</div>
      <p>No orders found.</p>
    </div>
  </div>
</app-layout>
