<app-layout>
  <div class="page-header">
    <h1 class="page-title">Orders</h1>
    <div class="summary-badges">
      <span class="badge badge-success">{{ orders.length }} Total</span>
    </div>
  </div>

  <div class="card">
    <div class="orders-toolbar">
      <input class="form-control search-input" type="text" placeholder="Search by table or order #..."
             [(ngModel)]="searchTerm" (input)="applyFilter()" />
      <select class="form-control status-filter" [(ngModel)]="filterStatus" (change)="applyFilter()">
        <option value="all">All Status</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <table class="table" *ngIf="filteredOrders.length > 0">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Table</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of filteredOrders">
          <td><strong>#{{ o.id }}</strong></td>
          <td>{{ o.table }}</td>
          <td>{{ o.items }} items</td>
          <td>{{ o.currency }} {{ o.total | number:'1.2-2' }}</td>
          <td>
            <span class="badge"
              [class.badge-success]="o.status === 'completed'"
              [class.badge-warning]="o.status === 'pending'"
              [class.badge-danger]="o.status === 'cancelled'">
              {{ o.status }}
            </span>
          </td>
          <td class="date-cell">{{ o.date }}</td>
          <td>
            <button class="btn btn-outline btn-sm">🖨️ Print</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="empty-state" *ngIf="filteredOrders.length === 0">
      <div class="empty-icon">📋</div>
      <p>No orders found.</p>
    </div>
  </div>
</app-layout>
