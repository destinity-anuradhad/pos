name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Angular
        run: cd frontend && npx ng build --configuration production

      - name: Add iOS platform
        run: |
          echo "Running cap add ios..."
          npx cap add ios
          echo "cap add ios exit code: $?"
          echo "--- ios/ contents ---"
          ls -la ios/ 2>/dev/null || echo "ios/ does not exist"
          echo "--- ios/App/ contents ---"
          ls -la ios/App/ 2>/dev/null || echo "ios/App/ does not exist"

      - name: Ensure Podfile exists
        run: |
          if [ ! -f "ios/App/Podfile" ]; then
            echo "ERROR: Podfile not found. Copying from @capacitor/ios template..."
            # Manually set up ios project from the @capacitor/ios package template
            node -e "
              const fs = require('fs');
              const path = require('path');
              const pkg = path.dirname(require.resolve('@capacitor/ios/package.json'));
              const template = path.join(pkg, 'ios-template');
              console.log('Template path:', template);
              console.log('Template exists:', fs.existsSync(template));
              if (fs.existsSync(template)) {
                const { execSync } = require('child_process');
                execSync('cp -r ' + template + ' ios', { stdio: 'inherit' });
              }
            "
            echo "--- ios/ after copy ---"
            ls -la ios/ 2>/dev/null || echo "still no ios/"
            ls -la ios/App/ 2>/dev/null || echo "still no ios/App/"
          else
            echo "Podfile found at ios/App/Podfile"
          fi

      - name: Install CocoaPods dependencies
        run: cd ios/App && pod install --repo-update

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS app (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/App/build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          mkdir -p ios/App/ipa/Payload
          APP=$(find ios/App/build -name "*.app" -not -path "*/Intermediates/*" -maxdepth 8 | head -1)
          echo "Found .app at: $APP"
          cp -r "$APP" ios/App/ipa/Payload/
          cd ios/App/ipa
          zip -r Destinity-Inspire-POS.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: destinity-inspire-pos-ios
          path: ios/App/ipa/Destinity-Inspire-POS.ipa
          retention-days: 30
